<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Behavioral Surveillance</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="normal-state" id="body-container">

    <div class="background-effects">
        <div class="glow-orb top-left"></div>
        <div class="glow-orb bottom-right"></div>
    </div>

    <div class="dashboard-container">
        
        <header class="header">
            <h1 class="logo">AI<span>Surveillance</span></h1>
            <div class="system-status-badge" id="header-status">
                <span class="status-dot"></span> System Active
            </div>
        </header>

        <main class="main-content">
            <!-- Left Side: Video Feed -->
            <div class="video-section">
                <div class="video-container" id="video-frame-container">
                    <div class="camera-label">CCTV-01: Main Feed</div>
                    <img src="{{ url_for('video_feed') }}" alt="Live Surveillance Feed" class="video-stream">
                    <!-- Scanline overlay effect -->
                    <div class="scanlines"></div>
                </div>
            </div>

            <!-- Right Side: Analytics Panel -->
            <div class="analytics-section">
                
                <div class="status-card glass-panel" id="main-status-card">
                    <h2>Current State</h2>
                    <h3 id="behavior-status">NORMAL</h3>
                    <p class="subtitle" id="status-subtitle">Monitoring environment safely.</p>
                </div>

                <div class="metrics-grid">
                    <div class="metric-card glass-panel">
                        <span class="metric-title">Aggression Logic</span>
                        <div class="metric-value">
                            <span id="pose-score">0.00</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" id="pose-bar"></div>
                        </div>
                    </div>

                    <div class="metric-card glass-panel">
                        <span class="metric-title">Audio / Yelling</span>
                        <div class="metric-value">
                            <span id="audio-score">0.00</span><span class="db-label">rms</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" id="audio-bar"></div>
                        </div>
                    </div>
                </div>

                <div class="log-card glass-panel">
                    <h3>Action Logs</h3>
                    <ul class="log-list" id="action-logs">
                        <li><span class="log-time">Now</span> System initialized successfully.</li>
                        <li><span class="log-time">-</span> Awaiting behavioral anomalies.</li>
                    </ul>
                </div>

            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
